<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart To-Do Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --blue:#3b82f6;
 --accent:#22d3ee;
 --glass:rgba(15,23,42,0.85);
 --text:#f8fafc;
 --red:#ef4444;
 --green:#10b981;
 --yellow:#f59e0b;
}

*{box-sizing:border-box;font-family:'Outfit',sans-serif}

body{
 margin:0;
 min-height:100vh;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 display:flex;
 justify-content:center;
 align-items:center;
 color:var(--text);
}

/* Mobile Friendly Background */
@media(max-width:768px){
 body{
  background:linear-gradient(180deg,#141e30,#243b55);
 }
}

.wrapper{
 display:flex;
 gap:25px;
 width:95%;
 max-width:1100px;
 padding:20px;
}

/* Dashboard */
.dashboard{
 width:280px;
 background:var(--glass);
 backdrop-filter:blur(15px);
 padding:25px;
 border-radius:25px;
 display:flex;
 flex-direction:column;
 align-items:center;
}

.progress-container{
 position:relative;
 width:150px;
 height:150px;
 margin-bottom:20px;
}

.progress-ring{
 transform:rotate(-90deg);
 width:100%;
 height:100%;
}

.progress-ring circle{
 fill:none;
 stroke-width:8;
}

.bg-ring{stroke:rgba(255,255,255,0.08)}

.progress{
 stroke:url(#gradient);
 stroke-dasharray:440;
 stroke-dashoffset:440;
 transition:1s ease;
}

.progress-text{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-weight:700;
 font-size:1.8rem;
 color:var(--accent);
}

.stat{
 width:100%;
 margin-top:10px;
 display:flex;
 justify-content:space-between;
 background:rgba(255,255,255,0.05);
 padding:12px;
 border-radius:12px;
}

/* Main App */
.todo-app{
 flex:1;
 background:var(--glass);
 backdrop-filter:blur(20px);
 padding:30px;
 border-radius:30px;
 display:flex;
 flex-direction:column;
}

h2{
 margin:0 0 20px 0;
}

.input-group{
 display:flex;
 flex-direction:column;
 gap:10px;
 margin-bottom:20px;
}

input,select{
 padding:12px;
 border-radius:10px;
 border:none;
 outline:none;
 background:rgba(255,255,255,0.08);
 color:white;
}

input[type="date"], input[type="time"]{
 cursor:pointer;
}

button{
 padding:14px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#1e40af,#0891b2);
 color:white;
 font-weight:600;
 cursor:pointer;
}

ul{
 list-style:none;
 padding:0;
 margin:0;
}

li{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:rgba(255,255,255,0.05);
 padding:15px;
 border-radius:15px;
 margin-bottom:10px;
 border-left:5px solid transparent;
}

.priority-high{border-left-color:var(--red)}
.priority-med{border-left-color:var(--yellow)}
.priority-low{border-left-color:var(--green)}

.overdue{
 border-left:5px solid var(--red);
 background:rgba(239,68,68,0.1);
}

.buttons{
 display:flex;
 gap:8px;
}

.buttons button{
 width:34px;
 height:34px;
 border-radius:8px;
}

.done{background:var(--green)}
.edit{background:var(--yellow)}
.delete{background:var(--red)}

@media(max-width:900px){
 .wrapper{flex-direction:column}
 .dashboard{width:100%}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="dashboard">
<div class="progress-container">
<svg class="progress-ring" viewBox="0 0 100 100">
<defs>
<linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#3b82f6"/>
<stop offset="100%" stop-color="#22d3ee"/>
</linearGradient>
</defs>
<circle class="bg-ring" cx="50" cy="50" r="70"/>
<circle class="progress" cx="50" cy="50" r="70"/>
</svg>
<div class="progress-text" id="percent">0%</div>
</div>

<div class="stat"><span>Total</span><b id="total">0</b></div>
<div class="stat"><span>Completed</span><b id="completed">0</b></div>
<div class="stat"><span>Overdue</span><b id="overdue">0</b></div>
</div>

<div class="todo-app">
<h2>Smart To-Do Pro</h2>

<div class="input-group">
<input type="text" id="taskInput" placeholder="Enter task...">

<!-- Calendar Added Here -->
<input type="date" id="taskDate">
<input type="time" id="taskTime">

<select id="priority">
<option value="low">Low Priority</option>
<option value="med">Medium Priority</option>
<option value="high">High Priority</option>
</select>

<button onclick="addTask()">Add Task</button>
</div>

<ul id="taskList"></ul>
</div>

</div>

<script>
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function save(){
 localStorage.setItem("tasks",JSON.stringify(tasks));
 render();
}

function addTask(){
 const text=document.getElementById("taskInput").value.trim();
 const date=document.getElementById("taskDate").value;
 const time=document.getElementById("taskTime").value;
 const priority=document.getElementById("priority").value;

 if(!text) return alert("Enter task");

 const datetime=date && time ? date+"T"+time : null;

 tasks.push({text,datetime,priority,completed:false});
 document.getElementById("taskInput").value="";
 save();
}

function toggle(i){tasks[i].completed=!tasks[i].completed;save();}
function removeTask(i){tasks.splice(i,1);save();}

function render(){
 const list=document.getElementById("taskList");
 list.innerHTML="";
 const now=new Date();

 let comp=0,over=0;

 tasks.forEach((t,i)=>{
  if(t.completed) comp++;
  else if(t.datetime && new Date(t.datetime)<now) over++;

  const li=document.createElement("li");
  li.classList.add("priority-"+t.priority);

  if(!t.completed && t.datetime && new Date(t.datetime)<now){
   li.classList.add("overdue");
  }

  li.innerHTML=`
  <div>
   <div style="text-decoration:${t.completed?"line-through":"none"}">${t.text}</div>
   <small>${t.datetime? t.datetime.replace("T"," ") : "No Date"}</small>
  </div>
  <div class="buttons">
   <button class="done" onclick="toggle(${i})">✔</button>
   <button class="delete" onclick="removeTask(${i})">🗑</button>
  </div>
  `;
  list.appendChild(li);
 });

 document.getElementById("total").innerText=tasks.length;
 document.getElementById("completed").innerText=comp;
 document.getElementById("overdue").innerText=over;

 const percent=tasks.length===0?0:Math.round((comp/tasks.length)*100);
 document.getElementById("percent").innerText=percent+"%";

 const circle=document.querySelector(".progress");
 const offset=440-(percent/100)*440;
 circle.style.strokeDashoffset=offset;
}

render();
</script>

</body>
</html>
